name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: jason-hsbc
  REGION: europe-west2
  REPO_NAME: my-docker-repo
  SERVICE_NAME: cr-webui
  IMAGE_NAME: fastapi-webui

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Configure Docker Auth
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_PATH ./app
          docker push $IMAGE_PATH

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: >-
            --service-account=cr-webui-runtime-sa@jason-hsbc.iam.gserviceaccount.com
            --no-allow-unauthenticated

      - name: Post Deployment Verification
        run: |
          echo "========================================"
          echo "✅ Deployment Verification Status"
          echo "========================================"
          echo "Cloud Run Service URL: ${{ steps.deploy.outputs.url }}"
          echo "To verify the security lock, a direct curl should return 403 Forbidden."